server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the HTML shell. Otherwise clients can keep an old index.html
    # that references chunk files that no longer exist after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Static assets: serve or 404 (do NOT fall back to index.html).
    # Prevents "error loading dynamically imported module" when a stale chunk URL
    # would otherwise return index.html (HTML) with 200.
    location ~* \.(?:js|css|map|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Angular SPA: try file, then directory, then fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend (Docker Compose service name)
    location /api/ {
        proxy_pass http://backend:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger/OpenAPI (optional, for debugging)
    location /swagger {
        proxy_pass http://backend:5001/swagger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
